<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector - AI Powered</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <i class="fas fa-shield-alt logo-icon"></i>
            <h1>Fake News Detector</h1>
            <p>AI-Powered News Authenticity Analyzer</p>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Input Section -->
        <section class="input-section">
            <h2><i class="fas fa-newspaper"></i> Enter News Article or Text</h2>
            
            <textarea 
                id="newsText" 
                class="input-textarea" 
                placeholder="Paste your news article, headline, or any text here... (Minimum 10 words)"
                rows="8"
            ></textarea>

            <div class="input-info">
                <span class="word-count">Words: <span id="wordCount">0</span></span>
                <span class="char-count">Characters: <span id="charCount">0</span></span>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <div class="button-group">
                <button id="analyzeBtn" class="btn btn-primary">
                    <i class="fas fa-search"></i> Analyze News
                </button>
                <button id="clearBtn" class="btn btn-secondary">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
        </section>

        <!-- Result Section -->
        <section id="resultSection" class="result-section" style="display: none;">
            <div id="resultCard" class="result-card">
                <!-- Result will be dynamically inserted here -->
            </div>
        </section>

        <!-- History Section -->
        <section id="historySection" class="history-section" style="display: none;">
            <h2><i class="fas fa-history"></i> Recent Analysis</h2>
            <div id="historyGrid" class="history-grid">
                <!-- History items will be inserted here -->
            </div>
        </section>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p>Analyzing news article...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Fake News Detector | Powered by AI & Machine Learning</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
